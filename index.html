<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro Pluma v4 — Spinner</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1714;
    }

    #bg {
      position: fixed;
      inset: 0;
      background: url(background-1.png) center / cover no-repeat;
      filter: blur(10px);
      transform: scale(1.05);
    }
    #bg-vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 55%, rgba(26,23,20,0.4) 0%, transparent 100%);
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #1a1714;
    }

    /* The spinner line.
       Positioned so its bottom edge sits at vertical center (50vh),
       horizontally at 65% of viewport width.
       It grows upward — height animates from 0 to 50vh.
       transform-origin: bottom center ensures growth goes upward. */
    #line {
      position: fixed;
      bottom: 50%;
      left: calc(65% - 0.5px);
      width: 1px;
      height: 0;
      background: #b08a72;
      transform-origin: bottom center;
      box-shadow: 0 0 4px 1px rgba(176, 138, 114, 0.3);
    }

    #brand-text {
      position: fixed;
      bottom: 50%;
      /* misma altura que la base de la línea */
      right: calc(35% + 12px);
      /* a la izquierda de la línea */
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      letter-spacing: 3px;
      color: #b08a72;
      opacity: 0.8;
      white-space: nowrap;
      text-align: right;
    }

    .wave-ring {
      position: fixed;
      z-index: 5;
      border-radius: 50%;
      pointer-events: none;
      top: 45%;
      left: 40%;
      width: 0;
      height: 0;
      transform: translate(-50%, -50%);
      opacity: 0;
    }
    #wave1 { border: 4px solid rgba(176, 138, 114, 0.6); }
    #wave2 { border: 3px solid rgba(176, 138, 114, 0.35); }
    #wave3 { border: 4px solid rgba(176, 138, 114, 0.45); }
    #wave4 { border: 3px solid rgba(176, 138, 114, 0.25); }
  </style>
</head>

<body>

  <div id="bg"></div>
  <div id="bg-vignette"></div>
  <div id="overlay"></div>

  <!-- Ondas circulares de reveal -->
  <div class="wave-ring" id="wave1"></div>
  <div class="wave-ring" id="wave2"></div>
  <div class="wave-ring" id="wave3"></div>
  <div class="wave-ring" id="wave4"></div>

  <!-- Texto final de la landing — posición definitiva -->

    <h1

      Dra. Durban</h1>
    <p
      style="font-family:system-ui,sans-serif; font-size:13px; color:#fdfcfb; letter-spacing:4.5px; text-shadow: 0 1px 8px rgba(26,23,20,0.6); text-transform:uppercase; margin-top:4px; font-weight:300;">
      Cirugía estética en Sevilla</p>
    <p
      style="font-family:Georgia,'Times New Roman',serif; font-size:24px; color:#4a3a2e; letter-spacing:4px; margin-top:35px; font-weight:500; font-style:italic; background: rgba(176,138,114,0.35); backdrop-filter: blur(30px) saturate(1.2); -webkit-backdrop-filter: blur(30px) saturate(1.2); padding: 12px 24px; border-radius: 8px;">
      <span
        style="font-size:30px; vertical-align:middle; position:relative; top:-8px; margin-right:4px;">&#10075;</span><span id="slogan-text">Intentamos hacer fácil el paso más difícil</span><span
        style="font-size:30px; vertical-align:middle; position:relative; top:-8px; margin-left:4px;">&#10076;</span>
    </p>
  </div>
  <div id="line"></div>
  <div id="brand-text">Dra. Durban</div>

      <!-- Curva secundaria (la pluma pequeña de la izquierda) -->
      <path fill="#7a6a58" d="M 252.5,144.5 C 253.552,144.351 254.552,144.517 255.5,145C 241.749,154.083 229.916,165.249 220,178.5C 204.251,205 188.251,231.333 172,257.5C 150.41,283.729 122.576,298.896 88.5,303C 79.8654,304.312 71.1987,304.645 62.5,304C 96.9207,300.879 125.921,286.879 149.5,262C 146.123,261.548 142.789,260.882 139.5,260C 138.549,259.282 138.383,258.449 139,257.5C 154.396,249.445 167.396,238.445 178,224.5C 178.688,223.668 178.521,223.002 177.5,222.5C 174.607,223.74 171.773,225.074 169,226.5C 168.308,225.975 167.808,225.308 167.5,224.5C 183.403,198.426 203.403,175.926 227.5,157C 235.378,151.728 243.712,147.561 252.5,144.5 Z"/>
      <!-- Highlights internos -->
      <path opacity="0.5" fill="#d4b8a8" d="M 232.5,199.5 C 232.291,200.922 231.791,202.255 231,203.5C 222.236,213.147 214.736,222.98 208.5,233C 207.922,234.811 207.422,236.645 207,238.5C 206.667,238.167 206.333,237.833 206,237.5C 205.293,239.081 204.46,240.581 203.5,242C 203.833,242.333 204.167,242.667 204.5,243C 203.255,243.791 201.922,244.291 200.5,244.5C 208.969,227.88 219.635,212.88 232.5,199.5 Z"/>
      <path opacity="0.5" fill="#d4b8a8" d="M 173.5,314.5 C 172.71,320.258 172.71,325.592 173.5,330.5C 172.456,331.623 171.79,332.956 171.5,334.5C 173.271,337.962 172.438,340.629 169,342.5C 167.88,346.974 166.714,351.307 165.5,355.5C 166.651,341.415 169.317,327.749 173.5,314.5 Z"/>
      <path opacity="0.5" fill="#d4b8a8" d="M 163.5,364.5 C 164.339,365.641 165.006,366.974 165.5,368.5C 164.851,371.248 164.851,374.081 165.5,377C 164.916,384.679 164.249,392.346 163.5,400C 164.378,402.497 164.711,404.831 164.5,407C 163.883,409.277 163.216,411.444 162.5,413.5C 162.383,397.154 162.717,380.821 163.5,364.5 Z"/>
      <path opacity="0.4" fill="#d4b8a8" d="M 163.5,415.5 C 165.162,417.912 166.162,420.746 166.5,424C 166.412,425.946 166.079,427.946 165.5,430C 165.759,431.261 166.426,432.261 167.5,433C 167.167,433.333 166.833,433.667 166.5,434C 167.779,438.715 168.612,443.548 169,448.5C 170.315,451.798 171.815,454.965 173.5,458C 173.167,458.333 172.833,458.667 172.5,459C 174.11,465.162 176.11,471.162 178.5,477C 177.944,477.383 177.611,477.883 177.5,478.5C 168.884,458.517 164.218,437.517 163.5,415.5 Z"/>
      <path opacity="0.4" fill="#d4b8a8" d="M 189.5,454.5 C 189.917,465.887 190.251,477.553 190.5,489.5C 189.078,489.25 188.078,488.417 187.5,487C 188.399,484.462 188.066,481.962 186.5,479.5C 188.769,475.563 189.102,471.396 187.5,467C 188.08,462.684 188.747,458.517 189.5,454.5 Z"/>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    window.addEventListener('load', function () {
      var line = document.getElementById('line');

      var brandText = document.getElementById('brand-text');

      // Precargar recursos reales (fotos, fonts) y ligar progreso a la línea
      var resources = [
        'background-1.png',
        'background-1.png',
        'background-1.png', // duplicada para simular más carga
        'background-1.png',
        'background-1.png',
        'background-1.png',
        'background-1.png'
      ];

      var loaded = 0;
      var total = resources.length;
      var targetHeight = 25; // vh — fase 1 llega hasta 25vh (mitad del recorrido total)

      // Fase 1: la línea sube de 0 a 25vh en ~3s simulando carga de 1.2MB
      // La carga real de fotos ocurre en paralelo pero la línea avanza a ritmo de red real
      var MIN_LOAD_TIME = 3000; // ms — tiempo mínimo que dura la fase 1
      var startTime = Date.now();
      var allLoaded = false;

      function updateProgress() {
        loaded++;
        if (loaded >= total) allLoaded = true;
      }

      // Animar la línea suavemente durante MIN_LOAD_TIME
      gsap.to(line, {
        height: targetHeight + 'vh',
        duration: MIN_LOAD_TIME / 1000,
        ease: 'power2.in', // de menos a más velocidad
        onComplete: function () {
          // Si los recursos aún no han cargado, esperar
          if (!allLoaded) {
            var checkInterval = setInterval(function () {
              if (allLoaded) {
                clearInterval(checkInterval);
                triggerTajo();
              }
            }, 100);
          } else {
            triggerTajo();
          }
        }
      });

      function triggerTajo() {
        var tajoDuration = 0.25;

        // Tajo + desaparición de texto SIMULTÁNEOS, sin pausa
        gsap.to(brandText, {
          opacity: 0,
          duration: tajoDuration,
          ease: 'power1.out'
        });

        var pluma = document.getElementById('pluma');

        // TAJO: de 25vh a 50vh, muy rápido
        gsap.to(line, {
          height: 'calc(50vh - 72px)',
          duration: tajoDuration,
          ease: 'power4.in',
          onComplete: function () {
            // La pluma NACE con glow que se atenúa
            // La pluma aparece con su color normal
            gsap.fromTo(pluma,
              { opacity: 0, scale: 0 },
              { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.7)', delay: 0 }
            );

            // FOGONAZO: clon de la pluma en blanco puro, escalado grande, que se expande y desaparece
            var flash = pluma.cloneNode(true);
            flash.id = 'pluma-flash';
            flash.style.opacity = '0';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '5';
            flash.style.transformOrigin = '50% 50%'; /* expande desde el centro de la pluma, no desde la base */
            // Hacer todos los paths blancos
            flash.querySelectorAll('path').forEach(function (p) { p.setAttribute('fill', '#f0d8c8'); });
            document.body.appendChild(flash);

            // El fogonazo: aparece instantáneo, se expande y se desvanece
            gsap.fromTo(flash,
              { opacity: 1, scale: 1, filter: 'blur(0px) drop-shadow(0 0 30px rgba(240,216,200,1)) drop-shadow(0 0 60px rgba(210,178,155,0.8)) drop-shadow(0 0 100px rgba(176,138,114,0.6))' },
              {
                opacity: 0, scale: 2.5, filter: 'blur(8px) drop-shadow(0 0 60px rgba(240,216,200,0)) drop-shadow(0 0 100px rgba(210,178,155,0)) drop-shadow(0 0 150px rgba(176,138,114,0))',
                duration: 0.8, ease: 'power2.out',
                onComplete: function () { flash.remove(); }
              }
            );

            // La línea desaparece
            gsap.to(line, {
              clipPath: 'inset(0 0 100% 0)',
              duration: 0.1,
              ease: 'power1.inOut',
              delay: 0.2,
              onComplete: function () {
                line.style.display = 'none';
              }
            });

            // === CAÍDA DE LA PLUMA ===
            // Desde donde nació (top:0, left:65%) hasta L (top:40%, left:25%)
            // Usamos x/y RELATIVOS de GSAP — sin tocar top/left, sin saltos
            // La punta gira a la DERECHA primero (cae de barriga), luego se endereza

            var fallTl = gsap.timeline({ delay: 0.5 });

            // Distancia a recorrer (relativa desde posición actual)
            var targetY = window.innerHeight * 0.378; // hasta la altura del texto "Dra. Durban"
            var targetX = -(window.innerWidth * 0.24); // 5% más cerca

            // Caída orgánica continua — sin fases, sin parones
            // Un solo proxy de 0→1 con onUpdate que calcula todo frame a frame
            var proxy = { t: 0 };
            var FALL_DUR = 3; // segundos

            gsap.to(proxy, {
              t: 1,
              duration: FALL_DUR,
              ease: 'power1.inOut',
              onUpdate: function() {
                var t = proxy.t;

                // Y: aceleración suave tipo gravedad con resistencia
                var yProgress = Math.pow(t, 1.3);
                var y = targetY * yProgress;

                // X: drift general hacia la izquierda + ondulación sinusoidal
                var xDrift = targetX * t;
                var xWave = Math.sin(t * Math.PI * 2.5) * 25 * (1 - t); // ondula más al principio, menos al final
                var x = xDrift + xWave;

                // Rotación: gira a la derecha al principio, mece, se estabiliza
                var rotBase = 35 * Math.sin(t * Math.PI); // arco: 0→35→0
                var rotWobble = 12 * Math.sin(t * Math.PI * 3) * (1 - t); // balanceo amortiguado
                var rotation = rotBase + rotWobble;

                // Scale: crece suavemente de 1 a 2
                var scale = 1 + t;

                gsap.set(pluma, { x: x, y: y, rotation: rotation, scale: scale });
              },
              onComplete: function() {
                // === ONDAS + REVEAL cuando la pluma aterriza ===
                var overlay = document.getElementById('overlay');
                var wave1 = document.getElementById('wave1');
                var wave2 = document.getElementById('wave2');
                var wave3 = document.getElementById('wave3');
                var wave4 = document.getElementById('wave4');
                var maxRadius = Math.max(window.innerWidth, window.innerHeight) * 2.5;
                var revealRadius = { value: 0 };

                function updateOverlayMask() {
                  var r = revealRadius.value;
                  if (r <= 0) {
                    overlay.style.background = '#1a1714';
                    return;
                  }
                  // Borde flat duro — transparent hasta r-2, sólido en r
                  overlay.style.background = 'radial-gradient(circle ' + r + 'px at 40% 45%, transparent ' + Math.max(0, r - 2) + 'px, #1a1714 ' + r + 'px)';
                }

                var waveTl = gsap.timeline();

                // Wave 1: anillo warm-rose
                waveTl.fromTo(wave1,
                  { width: 0, height: 0, opacity: 0 },
                  { width: maxRadius * 0.45, height: maxRadius * 0.45, opacity: 0.8, duration: 2, ease: 'power1.out' },
                  0
                );
                waveTl.to(wave1, { opacity: 0, duration: 0.8, ease: 'power2.in' }, 1.4);

                // Wave 2: reveal (abre agujero en el overlay) + anillo
                waveTl.to(revealRadius, {
                  value: maxRadius * 0.3,
                  duration: 2,
                  ease: 'power1.out',
                  onUpdate: updateOverlayMask
                }, 0.5);
                waveTl.fromTo(wave2,
                  { width: 0, height: 0, opacity: 0 },
                  { width: maxRadius * 0.55, height: maxRadius * 0.55, opacity: 0.5, duration: 2, ease: 'power1.out' },
                  0.5
                );
                waveTl.to(wave2, { opacity: 0, duration: 0.8, ease: 'power2.in' }, 1.8);

                // Wave 3: anillo
                waveTl.fromTo(wave3,
                  { width: 0, height: 0, opacity: 0 },
                  { width: maxRadius * 0.7, height: maxRadius * 0.7, opacity: 0.6, duration: 2, ease: 'power1.out' },
                  1.0
                );
                waveTl.to(wave3, { opacity: 0, duration: 0.8, ease: 'power2.in' }, 2.2);

                // Wave 4: más reveal + anillo
                waveTl.to(revealRadius, {
                  value: maxRadius * 0.7,
                  duration: 2,
                  ease: 'power1.out',
                  onUpdate: updateOverlayMask
                }, 1.5);
                waveTl.fromTo(wave4,
                  { width: 0, height: 0, opacity: 0 },
                  { width: maxRadius * 0.9, height: maxRadius * 0.9, opacity: 0.4, duration: 2, ease: 'power1.out' },
                  1.5
                );
                waveTl.to(wave4, { opacity: 0, duration: 0.8, ease: 'power2.in' }, 2.8);

                // Textos aparecen 0.5s después de que empiecen las ondas
                var landingText = document.getElementById('landing-text');
                waveTl.to(landingText, { opacity: 1, visibility: 'visible', duration: 1, ease: 'power1.out' }, 0.5);

                // La pluma cambia de color cuando aparece el texto
                var plumaPaths = pluma.querySelectorAll('path');
                // SVG mantiene su color original — no cambia después de la caída

                // Reveal final: overlay desaparece completamente
                waveTl.to(overlay, { opacity: 0, duration: 1.5, ease: 'power2.out' }, 3.0);
              }
            });

          }
        });
      }

      // Cargar cada recurso
      resources.forEach(function (src) {
        var img = new Image();
        img.onload = updateProgress;
        img.onerror = updateProgress; // contar errores también para no bloquear
        img.src = src;
      });
    });
  </script>

</body>

</html>
